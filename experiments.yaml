# ============================================================
# TAGGER — Full Experiment Matrix
# ============================================================
#
# Dataset facts baked into these configs:
#   Train rows : ~1.6 crore (16M), after NULL filter → ~15.4M
#   Val rows   : separate test_txn.csv, capped at 50K
#   Categories : 49 total, 48 real (NULL = unclassified → filtered out)
#   Distribution: heavily long-tailed — max ~22L, min ~8K per class
#
# Key design decisions applied to ALL configs:
#   filter_null_label : true           drop unclassified rows before training
#   sample_size       : 1_500_000      stratified; ~35 min/epoch on ml.g5.4xlarge
#   pk_p              : 48             all 48 real classes per SupCon batch
#   pk_k              : 8              safe — min class has 8K samples
#   patience          : 4              4 × 35 min ≈ 2.3 h of no-improvement tolerance
#   epochs            : 20             early stopping decides; ceiling only
#   num_workers       : 8              sized for ml.g5.4xlarge (16 vCPU)
#   base_lr           : 2e-5           scales automatically with effective batch
#   base_batch_size   : 256            LR scaling reference
#
# LR auto-scaling (in code): scaled_lr = base_lr × sqrt(eff_batch / base_batch)
#   Triplet configs  (eff=1024) → scaled_lr ≈ 4.0e-5
#   SupCon P48×K8    (eff=1536) → scaled_lr ≈ 4.9e-5
#   SupCon P24×K16   (eff=1536) → scaled_lr ≈ 4.9e-5
#   SupCon P48×K4    (eff=768)  → scaled_lr ≈ 3.5e-5
#
# Experiment directory naming (auto-derived by code):
#   tagger_proj{text_proj_dim}_final{final_dim}_fd{fusion_depth}_{freeze}_bs{eff_batch}_lr{lr}_ext_{loss}
#   "ext" = external val file used (val_csv_path present)
#
# Run one tier:
#   python -m src.train_multi_expt_ --config experiments.yaml --format yaml
# (comment out all tiers except the one you want, or split into per-tier files)
# ============================================================


# ============================================================
# TIER 0  —  Foundation (run these first)
# 2×2 ablation: loss {triplet, supcon} × freeze {full, gradual}
# All use: bert-base-uncased, text_cleaning, mean pooling, cosine scheduler
# Expected exp dirs:
#   A: tagger_proj256_final256_fd1_full_bs1024_lr4.00e-05_ext_triplet
#   B: tagger_proj256_final256_fd1_gradual_bs1024_lr4.00e-05_ext_triplet
#   C: tagger_proj256_final256_fd1_full_bs1536_lr4.90e-05_ext_supcon
#   D: tagger_proj256_final256_fd1_gradual_bs1536_lr4.90e-05_ext_supcon
# ============================================================

# ---- A: Triplet + Semi-hard + Full BERT fine-tune ----
- csv_path: "./data/train_data.csv"
  val_csv_path: "./data/val_data.csv"
  filter_null_label: true
  sample_size: 1500000
  categorical_cols: ["tran_mode", "dr_cr_indctor", "sal_flag"]
  numeric_cols: ["tran_amt_in_ac"]
  label_col: "category"
  bert_model: "bert-base-uncased"
  text_proj_dim: 256
  final_dim: 256
  fusion_depth: 1
  freeze_strategy: "full"
  epochs: 20
  batch_size: 256
  accumulation_steps: 4
  base_batch_size: 256
  base_lr: 0.00002
  use_amp: true
  margin: 0.5
  dropout: 0.2
  patience: 4
  min_delta: 0.001
  loss_type: "triplet"
  mining_strategy: "semi_hard"
  text_cleaning: true
  text_col: "tran_partclr"
  pooling_strategy: "mean"
  scheduler_type: "cosine"
  warmup_ratio: 0.05
  num_workers: 8


