# ============================================================
# TIER 6  —  Text Column Experiments
# Each run uses the best base config (SupCon + full + P48×K8 + fd=1).
# Only text_col changes — everything else is identical so comparisons are clean.
#
# Q1: Does merchant name alone give better signal than the raw narration?
# Q2: Does a pre-cleaned merchant name beat the raw narration?
# Q3: Does combining merchant + narration beat either alone?
#
# Prerequisite: the CSV must contain the relevant columns:
#   merchant         — raw merchant name extracted from narration
#   cleaned_merchant — normalised/deduped merchant name
#
# Expected exp dirs (text_col segment appears after lr):
#   Q1: ...ext_merchant_supcon
#   Q2: ...ext_cleaned_merchant_supcon
#   Q3: ...ext_merchant+tran_partclr_supcon
# Run:
#   python -m src.train_multi_expt_ --config experiments6.yaml --format yaml
# ============================================================


# ---- Q1: merchant name only ----
- csv_path: "./data/train_data.csv"
  val_csv_path: "./data/val_data.csv"
  filter_null_label: true
  sample_size: 1500000
  categorical_cols: ["tran_mode", "dr_cr_indctor", "sal_flag"]
  numeric_cols: ["tran_amt_in_ac"]
  label_col: "category"
  bert_model: "bert-base-uncased"
  text_proj_dim: 256
  final_dim: 256
  fusion_depth: 1
  freeze_strategy: "full"
  epochs: 20
  batch_size: 256
  accumulation_steps: 4
  base_batch_size: 256
  base_lr: 0.00002
  use_amp: true
  margin: 0.5
  dropout: 0.2
  patience: 4
  min_delta: 0.001
  loss_type: "supcon"
  supcon_temperature: 0.07
  use_pk_sampler: true
  pk_p: 48
  pk_k: 8
  text_cleaning: false          # merchant is already clean — cleaning may corrupt it
  text_col: "merchant"
  pooling_strategy: "mean"
  scheduler_type: "cosine"
  warmup_ratio: 0.05
  num_workers: 8


# ---- Q2: cleaned_merchant only ----
- csv_path: "./data/train_data.csv"
  val_csv_path: "./data/val_data.csv"
  filter_null_label: true
  sample_size: 1500000
  categorical_cols: ["tran_mode", "dr_cr_indctor", "sal_flag"]
  numeric_cols: ["tran_amt_in_ac"]
  label_col: "category"
  bert_model: "bert-base-uncased"
  text_proj_dim: 256
  final_dim: 256
  fusion_depth: 1
  freeze_strategy: "full"
  epochs: 20
  batch_size: 256
  accumulation_steps: 4
  base_batch_size: 256
  base_lr: 0.00002
  use_amp: true
  margin: 0.5
  dropout: 0.2
  patience: 4
  min_delta: 0.001
  loss_type: "supcon"
  supcon_temperature: 0.07
  use_pk_sampler: true
  pk_p: 48
  pk_k: 8
  text_cleaning: false          # pre-cleaned column — no additional stripping needed
  text_col: "cleaned_merchant"
  pooling_strategy: "mean"
  scheduler_type: "cosine"
  warmup_ratio: 0.05
  num_workers: 8


# ---- Q3: cleaned_merchant + tran_partclr (concatenated) ----
# merchant name first gives BERT the semantic anchor before the noisy narration
- csv_path: "./data/train_data.csv"
  val_csv_path: "./data/val_data.csv"
  filter_null_label: true
  sample_size: 1500000
  categorical_cols: ["tran_mode", "dr_cr_indctor", "sal_flag"]
  numeric_cols: ["tran_amt_in_ac"]
  label_col: "category"
  bert_model: "bert-base-uncased"
  text_proj_dim: 256
  final_dim: 256
  fusion_depth: 1
  freeze_strategy: "full"
  epochs: 20
  batch_size: 256
  accumulation_steps: 4
  base_batch_size: 256
  base_lr: 0.00002
  use_amp: true
  margin: 0.5
  dropout: 0.2
  patience: 4
  min_delta: 0.001
  loss_type: "supcon"
  supcon_temperature: 0.07
  use_pk_sampler: true
  pk_p: 48
  pk_k: 8
  text_cleaning: true           # strip reference codes from tran_partclr portion
  text_col: ["cleaned_merchant", "tran_partclr"]
  pooling_strategy: "mean"
  scheduler_type: "cosine"
  warmup_ratio: 0.05
  num_workers: 8
