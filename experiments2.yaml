# ============================================================
# TIER 2  —  BERT Backbone
# Run the best overall config from Tier 0/1 with different encoders.
# Base assumed: best SupCon + full config (update freeze_strategy if gradual won).
# G uses cased BERT — preserves NEFT/IMPS/UPI/NACH abbreviation casing.
# H uses FinBERT  — domain-pretrained on financial text; lower LR (already domain-tuned).
# Expected exp dirs:
#   G: tagger_proj256_final256_fd1_full_bs1536_lr4.90e-05_ext_supcon
#   H: tagger_proj256_final256_fd1_full_bs1536_lr3.46e-05_ext_supcon
# Run:
#   python -m src.train_multi_expt_ --config experiments2.yaml --format yaml
# ============================================================


# ---- G: SupCon + PKSampler P48×K8 + Full + bert-base-cased ----
- csv_path: "./data/train_data.csv"
  val_csv_path: "./data/val_data.csv"
  filter_null_label: true
  sample_size: 1500000
  categorical_cols: ["tran_mode", "dr_cr_indctor", "sal_flag"]
  numeric_cols: ["tran_amt_in_ac"]
  label_col: "category"
  bert_model: "bert-base-cased"
  text_proj_dim: 256
  final_dim: 256
  fusion_depth: 1
  freeze_strategy: "full"
  epochs: 20
  batch_size: 256
  accumulation_steps: 4
  base_batch_size: 256
  base_lr: 0.00002
  use_amp: true
  margin: 0.5
  dropout: 0.2
  patience: 4
  min_delta: 0.001
  loss_type: "supcon"
  supcon_temperature: 0.07
  use_pk_sampler: true
  pk_p: 48
  pk_k: 8
  text_cleaning: true
  text_col: "tran_partclr"
  pooling_strategy: "mean"
  scheduler_type: "cosine"
  warmup_ratio: 0.05
  num_workers: 8


# ---- H: SupCon + PKSampler P48×K8 + Full + ProsusAI/finbert ----
# Lower base_lr (1e-5) — FinBERT is already domain-tuned, needs gentler fine-tuning.
# Verify Indian bank term tokenisation (IMPS, NACH, ECS, NEFT) before full run.
- csv_path: "./data/train_data.csv"
  val_csv_path: "./data/val_data.csv"
  filter_null_label: true
  sample_size: 1500000
  categorical_cols: ["tran_mode", "dr_cr_indctor", "sal_flag"]
  numeric_cols: ["tran_amt_in_ac"]
  label_col: "category"
  bert_model: "ProsusAI/finbert"
  text_proj_dim: 256
  final_dim: 256
  fusion_depth: 1
  freeze_strategy: "full"
  epochs: 15                # FinBERT converges faster; reduce ceiling slightly
  batch_size: 256
  accumulation_steps: 4
  base_batch_size: 256
  base_lr: 0.00001          # half of default — FinBERT already near task domain
  use_amp: true
  margin: 0.5
  dropout: 0.2
  patience: 4
  min_delta: 0.001
  loss_type: "supcon"
  supcon_temperature: 0.07
  use_pk_sampler: true
  pk_p: 48
  pk_k: 8
  text_cleaning: true
  text_col: "tran_partclr"
  pooling_strategy: "mean"
  scheduler_type: "cosine"
  warmup_ratio: 0.05
  num_workers: 8
